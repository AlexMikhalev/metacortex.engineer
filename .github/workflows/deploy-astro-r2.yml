name: Deploy Astro site to Cloudflare R2

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: astro-site
        run: bun install

      - name: Build Astro site
        working-directory: astro-site
        run: bun run build

      - name: Setup Wrangler
        run: npm install -g wrangler

      - name: Deploy static assets to R2
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          cd astro-site/dist
          find . -type f | while read -r file; do
            key="${file#./}"
            content_type=""
            case "$key" in
              *.html) content_type="text/html; charset=utf-8" ;;
              *.css) content_type="text/css; charset=utf-8" ;;
              *.js) content_type="application/javascript" ;;
              *.json) content_type="application/json" ;;
              *.xml) content_type="application/xml" ;;
              *.svg) content_type="image/svg+xml" ;;
              *.png) content_type="image/png" ;;
              *.jpg|*.jpeg) content_type="image/jpeg" ;;
              *.gif) content_type="image/gif" ;;
              *.ico) content_type="image/x-icon" ;;
              *.webp) content_type="image/webp" ;;
              *.woff) content_type="font/woff" ;;
              *.woff2) content_type="font/woff2" ;;
              *.ttf) content_type="font/ttf" ;;
              *.pdf) content_type="application/pdf" ;;
              *.txt) content_type="text/plain" ;;
            esac

            if [ -n "$content_type" ]; then
              wrangler r2 object put metacortex-engineer/"$key" --file "$file" --content-type "$content_type" --remote 2>/dev/null
            else
              wrangler r2 object put metacortex-engineer/"$key" --file "$file" --remote 2>/dev/null
            fi
            echo "Uploaded: $key"
          done

      - name: Purge Cloudflare Cache
        env:
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -n "$CLOUDFLARE_ZONE_ID" ] && [ -n "$CLOUDFLARE_API_TOKEN" ]; then
            curl -X POST "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/purge_cache" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data '{"purge_everything":true}'
          fi

      - name: Deployment Summary
        run: |
          echo "Deployment Complete"
          echo "Site: https://metacortex.engineer"
